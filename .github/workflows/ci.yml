name: CI

on:
  push:
    branches: [main, dev]
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.github/instructions/**'
      - 'doc/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.github/instructions/**'
      - 'doc/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout core (dependency)
        uses: actions/checkout@v4
        with:
          repository: wspulse/core
          path: core

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Setup workspace
        run: go work init . ./core

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout core (dependency)
        uses: actions/checkout@v4
        with:
          repository: wspulse/core
          path: core

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Setup workspace
        run: go work init . ./core

      - name: Run tests
        run: |
          COUNT=1
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then COUNT=5; fi
          go test -v -race -count=$COUNT ./...
